apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kinesis.fullname" . }}-test-connection"
  labels:
    {{- include "kinesis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: aws-cli
      image: "{{ .Values.testImage.repository }}:{{ .Values.testImage.tag }}"
      imagePullPolicy: {{ .Values.testImage.pullPolicy }}
      command: ["aws"]
      args:
        - kinesis
        - list-streams
        - --endpoint-url
        - "http://{{ include "kinesis.fullname" . }}:{{ .Values.service.port }}"
        - --region
        - {{ .Values.service.testRegion | quote }}
      env:
        - name: AWS_ACCESS_KEY_ID
          value: "test"
        - name: AWS_SECRET_ACCESS_KEY
          value: "test"
