apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kinesis.fullname" . }}-test-connection"
  labels:
    {{- include "kinesis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: aws-cli
      image: amazon/aws-cli:latest
      command: ["aws"]
      args:
        - kinesis
        - list-streams
        - --endpoint-url
        - "http://{{ include "kinesis.fullname" . }}:{{ .Values.service.port }}"
        - --region
        - "eu-west-1"
      env:
        - name: AWS_ACCESS_KEY_ID
          value: "test"
        - name: AWS_SECRET_ACCESS_KEY
          value: "test"
  restartPolicy: Never
