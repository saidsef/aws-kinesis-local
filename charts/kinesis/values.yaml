replicaCount: 1

image:
  repository: docker.io/saidsef/aws-kinesis-local
  pullPolicy: IfNotPresent
  # Date-style tag emitted by the docker CI workflow (vYYYY.MM). Leave empty to
  # fall back to .Chart.AppVersion (the kinesalite upstream version).
  tag: "v2026.06"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # If empty, a name is derived from the fullname template.
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  privileged: false
  runAsNonRoot: true
  runAsGroup: 65534
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  headless: false
  # Region passed to the `helm test` aws-cli invocation.
  testRegion: eu-west-1

# kinesalite tuning, surfaced as container env vars.
env:
  PORT: "4567"
  KPATH: "/data"
  SHARDLIMIT: "50"
  CREATESTREAMMS: "50"
  DELETESTREAMMS: "50"
  UPDATESTREAMMS: "50"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 200m
    memory: 1Gi

livenessProbe:
  tcpSocket:
    port: tcp
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: tcp
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

startupProbe:
  tcpSocket:
    port: tcp
  initialDelaySeconds: 2
  periodSeconds: 2
  failureThreshold: 30

# When enabled, /data is backed by a StatefulSet volumeClaimTemplate.
# Otherwise an emptyDir is used.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: ""

# Image used by the `helm test` hook to exercise the Kinesis API.
testImage:
  repository: amazon/aws-cli
  tag: "2.17.0"
  pullPolicy: IfNotPresent

revisionHistoryLimit: 5
terminationGracePeriodSeconds: 60

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
